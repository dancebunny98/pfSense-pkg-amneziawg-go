name: Build pfSense AmneziaWG package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone amneziawg-go source
        run: |
          git clone --depth=1 https://github.com/amnezia-vpn/amneziawg-go.git amneziawg-src
          echo "=== Checking cmd/amneziawg-go ==="
          if [ -d amneziawg-src/cmd/amneziawg-go ]; then
            echo "Found cmd/amneziawg-go"
          else
            echo "Directory cmd/amneziawg-go not found, assuming main.go in root"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build amneziawg-go binary
        working-directory: amneziawg-src
        run: |
          if [ -f cmd/amneziawg-go/main.go ]; then
            echo "Building from cmd/amneziawg-go"
            GOOS=freebsd GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -o ../amneziawg-go ./cmd/amneziawg-go
          else
            echo "Building from repository root"
            GOOS=freebsd GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -o ../amneziawg-go .
          fi

      - name: Prepare staging directory
        run: |
          # Создаём обязательные каталоги
          mkdir -p staging/usr/local/bin
          mkdir -p staging/usr/local/pkg
          mkdir -p staging/usr/local/www/amneziawg
          mkdir -p staging/usr/local/etc/rc.d
          mkdir -p staging/usr/local/etc/inc

          # Копируем собранный бинарник
          cp amneziawg-go staging/usr/local/bin/

          # Копируем все файлы из pfsense-files, исключая .gitkeep и пустые каталоги
          if [ -d pfsense-files ]; then
            echo "Copying pfsense-files content..."
            # Используем rsync с игнорированием .gitkeep, чтобы не тащить служебные файлы
            rsync -av --exclude='.gitkeep' pfsense-files/ staging/
          else
            echo "WARNING: pfsense-files directory not found."
            echo "Only the binary will be packaged. GUI/RC scripts missing!"
          fi

      - name: Create package manifest
        run: |
          cat > staging/+MANIFEST << EOF
          name: pfSense-pkg-amneziawg
          version: "1.0.0"
          arch: freebsd:${{ matrix.arch }}
          origin: net/pfSense-pkg-amneziawg
          comment: AmneziaWG obfuscated VPN for pfSense
          desc: Integrates amneziawg-go with GUI, supports all obfuscation parameters (Jc,Jmin,Jmax,S1,S2,H1-H4).
          maintainer: your@email.com
          www: https://github.com/your-repo/pfSense-amneziawg
          prefix: /usr/local
          EOF

      - name: Install FreeBSD pkg tool
        run: sudo apt-get update && sudo apt-get install -y pkg

      - name: Build .pkg
        run: |
          pkg create -M staging/+MANIFEST -r staging -o .
          mv pfSense-pkg-amneziawg-1.0.0.pkg pfSense-pkg-amneziawg-1.0.0-${{ matrix.arch }}.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pfSense-pkg-amneziawg-${{ matrix.arch }}
          path: pfSense-pkg-amneziawg-*.pkg
