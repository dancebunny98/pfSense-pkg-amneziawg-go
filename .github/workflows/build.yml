name: Build and Release pfSense AmneziaWG Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
      PKG_NAME: pfSense-pkg-amneziawg
      VERSION: 1.0.0

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone amneziawg-go source
        run: |
          git clone --depth=1 https://github.com/amnezia-vpn/amneziawg-go.git amneziawg-src
          echo "=== Checking cmd/amneziawg-go ==="
          if [ -d amneziawg-src/cmd/amneziawg-go ]; then
            echo "Found cmd/amneziawg-go"
          else
            echo "Directory cmd/amneziawg-go not found, assuming main.go in root"
          fi

      - name: Run go vet (optional, not blocking)
        working-directory: amneziawg-src
        run: go vet ./... || echo "go vet found issues, but continuing..."

      - name: Run tests (optional)
        working-directory: amneziawg-src
        run: go test ./... || echo "Tests failed or none - not blocking"

      # ================== Сборка бинарника ==================
      - name: Build amneziawg-go binary
        working-directory: amneziawg-src
        run: |
          if [ -f cmd/amneziawg-go/main.go ]; then
            echo "Building from cmd/amneziawg-go"
            GOOS=freebsd GOARCH=${{ env.ARCH }} CGO_ENABLED=0 go build -o ../amneziawg-go ./cmd/amneziawg-go
          else
            echo "Building from repository root"
            GOOS=freebsd GOARCH=${{ env.ARCH }} CGO_ENABLED=0 go build -o ../amneziawg-go .
          fi

      # ================== Подготовка staging ==================
      - name: Prepare staging directory
        run: |
          mkdir -p staging/usr/local/bin
          mkdir -p staging/usr/local/pkg
          mkdir -p staging/usr/local/www/amneziawg
          mkdir -p staging/usr/local/etc/rc.d
          mkdir -p staging/usr/local/etc/inc

          # Копируем бинарник
          cp amneziawg-go staging/usr/local/bin/

          # Копируем GUI/RC файлы из репозитория
          if [ -d pfsense-files ] && [ "$(ls -A pfsense-files 2>/dev/null)" ]; then
            echo "Copying pfsense-files content..."
            rsync -av --exclude='.gitkeep' pfsense-files/ staging/
          elif [ -d usr/local ]; then
            echo "Found usr/local/ in repository root, copying..."
            rsync -av \
              --exclude='.git' --exclude='.github' --exclude='staging' \
              --exclude='amneziawg-src' --exclude='pfsense-files' \
              --exclude='.gitkeep' --exclude='README.md' --exclude='LICENSE' \
              ./ staging/
          else
            echo "WARNING: GUI/RC files not found. Only binary will be packaged."
          fi

      # ================== Генерация XML-манифеста pfSense ==================
      - name: Create pfSense package XML
        run: |
          cat > staging/usr/local/pkg/amneziawg.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <!DOCTYPE packagegui SYSTEM "../schema/packages.dtd">
          <?xml-stylesheet type="text/xsl" href="../xsl/package.xsl"?>
          <packagegui>
            <name>amneziawg</name>
            <version>1.0.0</version>
            <title>AmneziaWG Obfuscated VPN</title>
            <category>Services</category>
            <license>MIT</license>
            <description>
              Integrates AmneziaWG (obfuscated WireGuard) into pfSense.
              Supports all obfuscation parameters: Jc, Jmin, Jmax, S1, S2, H1-H4.
              Provides a GUI for tunnel management and service control.
            </description>
            <include_file>/usr/local/pkg/amneziawg.inc</include_file>
            <menu>
              <name>AmneziaWG</name>
              <tooltiptext>Manage AmneziaWG Tunnels</tooltiptext>
              <section>Services</section>
              <url>/amneziawg/amneziawg.php</url>
            </menu>
            <service>
              <name>amneziawg</name>
              <rcfile>amneziawg</rcfile>
              <executable>amneziawg-go</executable>
              <description>AmneziaWG Daemon</description>
            </service>
            <custom_php_install_command>
              <![CDATA[
              // Create config directory and enable service
              mwexec("mkdir -p /var/etc/amneziawg");
              mwexec("/usr/local/etc/rc.d/amneziawg enable");
              ]]>
            </custom_php_install_command>
            <custom_php_pre_deinstall_command>
              <![CDATA[
              // Stop service and remove config files
              mwexec("/usr/local/etc/rc.d/amneziawg stop");
              mwexec("rm -rf /var/etc/amneziawg");
              ]]>
            </custom_php_pre_deinstall_command>
            <custom_php_resync_config_command>
              <![CDATA[
              // Restart service when config is synced
              mwexec("/usr/local/etc/rc.d/amneziawg restart");
              ]]>
            </custom_php_resync_config_command>
          </packagegui>
          XML

      # ================== Создание +MANIFEST (корректный формат) ==================
      - name: Create +MANIFEST
        run: |
          cat > staging/+MANIFEST << 'EOF'
          name: pfSense-pkg-amneziawg
          version: "1.0.0"
          arch: freebsd:amd64
          origin: net/pfSense-pkg-amneziawg
          comment: "AmneziaWG obfuscated VPN for pfSense"
          desc: "Integrates amneziawg-go with GUI, supports all obfuscation parameters (Jc, Jmin, Jmax, S1, S2, H1-H4)."
          maintainer: your@email.com
          www: https://github.com/your-repo/pfSense-amneziawg
          prefix: /usr/local
          EOF

      # ================== Сборка .pkg ==================
      - name: Build .pkg
        run: |
          cd staging
          FILES_LIST=$(find . -type f ! -name '+MANIFEST' | sort)
          tar -cf ../${{ env.PKG_NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.pkg \
            --format=ustar \
            +MANIFEST \
            $FILES_LIST
          cd ..
          echo "Package created: ${{ env.PKG_NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.pkg"

      # ================== Релиз ==================
      - name: Generate release notes
        if: github.event_name != 'pull_request'
        id: release_notes
        run: |
          echo '## Установка' >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "# Скачивание пакета через curl" >> release_notes.md
          echo "curl -LO https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${{ env.PKG_NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.pkg" >> release_notes.md
          echo '' >> release_notes.md
          echo "# Установка" >> release_notes.md
          echo "pkg add ${{ env.PKG_NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.pkg" >> release_notes.md
          echo '```' >> release_notes.md
          echo '' >> release_notes.md
          echo '## Удаление' >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "pkg delete ${{ env.PKG_NAME }}" >> release_notes.md
          echo '```' >> release_notes.md
          echo '' >> release_notes.md
          echo "## Установка из исходников (git)" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "git clone https://github.com/${{ github.repository }}.git" >> release_notes.md
          echo "cd $(basename ${{ github.repository }})" >> release_notes.md
          echo "# Следуйте инструкциям в README.md" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create/Update Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: release_notes.md
          files: ${{ env.PKG_NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
